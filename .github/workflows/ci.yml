name: NoteFlow CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Lint & Validate
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check server.js syntax
        run: node --check server.js

      - name: Check all frontend JS files
        run: |
          for f in public/js/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Verify required files exist
        run: |
          files=(
            "server.js"
            "public/index.html"
            "public/css/style.css"
            "public/js/app.js"
            "public/js/notes.js"
            "public/js/ai.js"
            "public/js/calendar.js"
            "public/js/reminders.js"
            "public/js/quotes.js"
            "public/js/animations.js"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done

  # ─────────────────────────────────────────────
  # JOB 2 — Integration Test
  # ─────────────────────────────────────────────
  test:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server in background
        run: |
          node server.js &
          echo $! > /tmp/server.pid
          sleep 3

      - name: Test — server health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          echo "Health check: $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: expected 200" && exit 1)

      - name: Test — GET /api/notes returns empty array
        run: |
          RESP=$(curl -s http://localhost:3000/api/notes)
          echo "GET /api/notes: $RESP"
          [ "$RESP" = "[]" ] || (echo "FAIL: expected []" && exit 1)

      - name: Test — POST /api/notes creates a note
        run: |
          RESP=$(curl -s -X POST http://localhost:3000/api/notes \
            -H "Content-Type: application/json" \
            -d '{
              "id": "ci-test-001",
              "title": "CI Test Note",
              "type": "note",
              "content": "Testing",
              "items": [],
              "priority": "high",
              "tags": ["ci"],
              "liked": false,
              "reminder": null,
              "dueDate": null,
              "color": "none",
              "createdAt": "2026-01-01T00:00:00Z",
              "updatedAt": "2026-01-01T00:00:00Z"
            }')
          echo "POST /api/notes: $RESP"
          echo "$RESP" | grep -q '"id":"ci-test-001"' || (echo "FAIL: note not created" && exit 1)

      - name: Test — GET /api/notes returns the created note
        run: |
          RESP=$(curl -s http://localhost:3000/api/notes)
          echo "GET after create: $RESP"
          echo "$RESP" | grep -q '"id":"ci-test-001"' || (echo "FAIL: note not found" && exit 1)

      - name: Test — PUT /api/notes/:id updates the note
        run: |
          RESP=$(curl -s -X PUT http://localhost:3000/api/notes/ci-test-001 \
            -H "Content-Type: application/json" \
            -d '{"title": "Updated CI Note"}')
          echo "PUT /api/notes/ci-test-001: $RESP"
          echo "$RESP" | grep -q '"title":"Updated CI Note"' || (echo "FAIL: note not updated" && exit 1)

      - name: Test — DELETE /api/notes/:id removes the note
        run: |
          RESP=$(curl -s -X DELETE http://localhost:3000/api/notes/ci-test-001)
          echo "DELETE /api/notes/ci-test-001: $RESP"
          echo "$RESP" | grep -q '"ok":true' || (echo "FAIL: delete failed" && exit 1)

      - name: Test — POST /api/ai returns error without API key
        run: |
          RESP=$(curl -s -X POST http://localhost:3000/api/ai \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"hi"}]}')
          echo "POST /api/ai (no key): $RESP"
          echo "$RESP" | grep -q '"error"' || (echo "FAIL: expected error response" && exit 1)

      - name: Stop server
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true

  # ─────────────────────────────────────────────
  # JOB 3 — Security Scan
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          if grep -r "sk-ant-" public/ server.js 2>/dev/null; then
            echo "FAIL: Possible API key found in source code!"
            exit 1
          fi
          echo "No hardcoded secrets found."

  # ─────────────────────────────────────────────
  # JOB 4 — Deploy notification (main branch only)
  # ─────────────────────────────────────────────
  deploy-ready:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: All checks passed
        run: |
          echo "================================================"
          echo "  NoteFlow v$(node -p "require('./package.json').version")"
          echo "  All CI checks passed on branch: main"
          echo "  Commit: ${{ github.sha }}"
          echo "  Ready for deployment!"
          echo "================================================"

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Validate | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| API Integration Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`$(node -p "require('./package.json').version")\`" >> $GITHUB_STEP_SUMMARY
